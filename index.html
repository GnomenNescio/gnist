<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gnist: Activity Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Gnist: Activity Finder</h1>
    <p>Find something fun to do with your kids!</p>
  </header>

  <main>
    <section id="filters">
      <h2>Filters</h2>

      <div class="filter-group">
        <h3>Location:</h3>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" name="location" value="Inside" checked>
            <span>Inside</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="location" value="Outside" checked>
            <span>Outside</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="location" value="Garden" checked>
            <span>Garden</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="location" value="Snow" checked>
            <span>Snow</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="location" value="Car" checked>
            <span>Car</span>
          </label>
        </div>
      </div>

      <div class="filter-group">
        <h3>Energy Level:</h3>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" name="energy" value="Calm" checked>
            <span>Calm</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="energy" value="Active" checked>
            <span>Active</span>
          </label>
        </div>
      </div>

      <button id="generate">Generate Ideas</button>
    </section>

    <section id="results">
      <h2>Ideas</h2>
      <div id="ideas">
        <p>Select filters and click "Generate Ideas."</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Made with ❤️ for busy parents</p>
  </footer>
  
  <script src="script.js"></script>
</body>
</html>
