<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gnist: Activity Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="top-bar">
    <div id="top-bar-header">
      <h1><span aria-hidden="true">🌟</span> Gnist</h1>
      <span class="tagline">Activity Finder for Kids</span>
    </div>

    <section id="filters">
      <div class="filters-bar">
        <div class="filter-group">
          <span class="filter-label">Location</span>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="location" value="Inside" checked>
              <span>Inside</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="location" value="Outside" checked>
              <span>Outside</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="location" value="Garden" checked>
              <span>Garden</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="location" value="Snow" checked>
              <span>Snow</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="location" value="Car" checked>
              <span>Car</span>
            </label>
          </div>
        </div>

        <div class="filter-divider"></div>

        <div class="filter-group">
          <span class="filter-label">Energy</span>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="energy" value="Calm" checked>
              <span>Calm</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="energy" value="Active" checked>
              <span>Active</span>
            </label>
          </div>
        </div>

        <button id="generate" aria-label="Generate activity ideas">✨ Generate</button>
      </div>
    </section>
  </div>

  <main>
    <section id="results">
      <div id="ideas">
        <p class="placeholder">Choose your filters above and hit <strong>Generate</strong> to find ideas!</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Made with ❤️ for busy parents</p>
  </footer>
  
  <script src="script.js"></script>
</body>
</html>
