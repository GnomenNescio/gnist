<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gnist: Activity Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="top-bar">
    <h1>Gnist</h1>

    <nav id="filters" aria-label="Filters">
      <div class="filters-bar">

        <div class="dropdown" id="location-dropdown">
          <button class="dropdown-trigger" id="location-trigger" aria-haspopup="true" aria-expanded="false" aria-controls="location-panel">
            <span class="dropdown-label" id="location-label-text">Location</span>
            <span class="dropdown-chevron" aria-hidden="true">▾</span>
          </button>
          <div class="dropdown-panel" id="location-panel" role="group" aria-labelledby="location-trigger" hidden>
            <div class="dropdown-item selected" role="checkbox" aria-checked="true" tabindex="0" data-group="location" data-value="Inside">Inside</div>
            <div class="dropdown-item selected" role="checkbox" aria-checked="true" tabindex="0" data-group="location" data-value="Outside">Outside</div>
            <div class="dropdown-item selected" role="checkbox" aria-checked="true" tabindex="0" data-group="location" data-value="Garden">Garden</div>
            <div class="dropdown-item selected" role="checkbox" aria-checked="true" tabindex="0" data-group="location" data-value="Snow">Snow</div>
            <div class="dropdown-item selected" role="checkbox" aria-checked="true" tabindex="0" data-group="location" data-value="Car">Car</div>
          </div>
        </div>

        <div class="dropdown" id="energy-dropdown">
          <button class="dropdown-trigger" id="energy-trigger" aria-haspopup="true" aria-expanded="false" aria-controls="energy-panel">
            <span class="dropdown-label" id="energy-label-text">Energy</span>
            <span class="dropdown-chevron" aria-hidden="true">▾</span>
          </button>
          <div class="dropdown-panel" id="energy-panel" role="group" aria-labelledby="energy-trigger" hidden>
            <div class="dropdown-item selected" role="checkbox" aria-checked="true" tabindex="0" data-group="energy" data-value="Calm">Calm</div>
            <div class="dropdown-item selected" role="checkbox" aria-checked="true" tabindex="0" data-group="energy" data-value="Active">Active</div>
          </div>
        </div>

      </div>
    </nav>
  </header>

  <main>
    <section id="results" aria-labelledby="results-heading">
      <h2 id="results-heading" class="visually-hidden">Ideas</h2>
      <div id="ideas">
        <p class="placeholder">Use the filters above to find activity ideas!</p>
      </div>
    </section>
  </main>

  
  <script src="script.js"></script>
</body>
</html>
